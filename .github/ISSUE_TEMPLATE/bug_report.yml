name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
