name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: xvfb-run -a npm run test:integration

      - name: Package extension
        run: npm run package -- --out bulk-extension-remover.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bulk-extension-remover
          path: bulk-extension-remover.vsix
